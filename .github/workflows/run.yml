name: Anime WhatsApp Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      # ✅ تخزين system packages مؤقتاً
      - name: Cache system packages
        uses: actions/cache@v3
        id: cache-system
        with:
          path: |
            /var/cache/apt/archives
            /usr/bin/chromium-browser
            /usr/bin/chromedriver
            /usr/bin/ffmpeg
            /usr/bin/Xvfb
          key: ${{ runner.os }}-system-${{ hashFiles('.github/workflows/system-deps.txt') }}
          restore-keys: |
            ${{ runner.os }}-system-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            x11-utils

      # ✅ **هنا الحل: تثبيت مكتبات Python الخاصة بالواتساب**
      - name: Install WhatsApp Python libraries
        run: |
          pip install --upgrade pip
          
          # الخيار 1: neonize (الأحدث والأقوى) [citation:1][citation:6]
          pip install neonize
          
          # الخيار 2: wawebpy (مكتبة Python للواتساب ويب) [citation:3]
          pip install wawebpy
          
          # الخيار 3: selenium (للتحكم المباشر بالمتصفح)
          pip install selenium webdriver-manager
          
          # الخيار 4: wa-automation [citation:9]
          pip install wa-automation

      # ✅ إنشاء requirements.txt بالطريقة الصحيحة
      - name: Create requirements.txt with WhatsApp libraries
        run: |
          cat > requirements.txt << 'EOF'
          # مكتبات واتساب
          neonize>=0.3.0
          wawebpy>=0.0.1
          selenium>=4.15.0
          webdriver-manager>=4.0.1
          
          # مكتبات إضافية
          pillow>=10.0.0
          requests>=2.31.0
          beautifulsoup4>=4.12.0
          lxml>=4.9.0
          EOF
          
          echo "✅ requirements.txt تم إنشاؤه:"
          cat requirements.txt

      # ✅ تخزين pip packages
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ✅ تثبيت جميع المكتبات (بما فيها مكتبات واتساب)
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
          echo "✅ المكتبات المثبتة:"
          pip list | grep -E "neonize|wawebpy|selenium|webdriver|pillow|requests"

      - name: Run Bot
        env:
          CHROME_BIN: /usr/bin/chromium-browser
          CHROME_DRIVER: /usr/bin/chromedriver
          DISPLAY: :99
        run: |
          # تشغيل Xvfb
          Xvfb :99 -screen 0 1024x768x24 -ac &
          sleep 3
          
          # تشغيل البوت
          python3 main.py || echo "Bot session ended"

      - name: Save session changes
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # حفظ الجلسة
          for file in database/anime_bot.db db.sqlite3 session/*.pkl auth_info.json neonize.db; do
            if [ -f "$file" ]; then
              git add "$file" 2>/dev/null || true
            fi
          done
          
          git commit -m "🤖 تحديث الجلسة [skip ci]" || echo "لا تغييرات"
          git push origin main || echo "فشل الرفع"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: bot-logs
          path: |
            *.log
            logs/
            screenshots/
          if-no-files-found: ignore
