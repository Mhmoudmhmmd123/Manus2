name: Anime WhatsApp Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'  # ⬅️ تم الترقية إلى 3.12
          cache: 'pip'

      # ✅ تخزين system packages مؤقتاً
      - name: Cache system packages
        uses: actions/cache@v3
        id: cache-system
        with:
          path: |
            /var/cache/apt/archives
            /usr/bin/chromium-browser
            /usr/bin/chromedriver
            /usr/bin/ffmpeg
            /usr/bin/Xvfb
          key: ${{ runner.os }}-system-${{ hashFiles('.github/workflows/system-deps.txt') }}
          restore-keys: |
            ${{ runner.os }}-system-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            x11-utils

      # ✅ **تثبيت pywa (الأفضل والأكثر استقراراً)**
      - name: Install WhatsApp Python libraries
        run: |
          pip install --upgrade pip
          # استخدام pywa بدلاً من wawebpy
          pip install pywa
          pip install selenium webdriver-manager

      # ✅ إنشاء requirements.txt محدث
      - name: Create requirements.txt
        run: |
          cat > requirements.txt << 'EOF'
          # مكتبات واتساب (محدثة)
          pywa>=1.0.0          # بديل wawebpy - مستقر وقوي
          selenium>=4.15.0
          webdriver-manager>=4.0.1
          
          # مكتبات إضافية
          pillow>=10.0.0
          requests>=2.31.0
          beautifulsoup4>=4.12.0
          lxml>=4.9.0
          python-dotenv>=1.0.0
          EOF
          
          echo "✅ requirements.txt:"
          cat requirements.txt

      # ✅ تخزين pip packages مؤقتاً
      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ✅ تثبيت المتطلبات
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          
          echo "✅ المكتبات المثبتة:"
          pip list | grep -E "pywa|selenium|webdriver|pillow|requests"

      # ✅ تشغيل البوت
      - name: Run Bot
        env:
          CHROME_BIN: /usr/bin/chromium-browser
          CHROME_DRIVER: /usr/bin/chromedriver
          DISPLAY: :99
        run: |
          Xvfb :99 -screen 0 1024x768x24 -ac &
          sleep 3
          
          for i in {1..3}; do
            echo "🔄 محاولة $i"
            python3 main.py && break || sleep 5
          done

      # ✅ حفظ الجلسة
      - name: Save session changes
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          for file in database/*.db *.sqlite3 session/*.pkl auth_info.json; do
            [ -f "$file" ] && git add "$file" 2>/dev/null
          done
          
          git commit -m "🤖 تحديث الجلسة [skip ci]" || echo "لا تغييرات"
          git push origin main || echo "فشل الرفع"

      # ✅ رفع السجلات (باستخدام v4)
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
            screenshots/
          if-no-files-found: ignore
          retention-days: 7
