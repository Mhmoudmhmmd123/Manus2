name: Anime WhatsApp Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      # ✅ تخزين system packages (يمنع إعادة التحميل)
      - name: Cache system packages
        uses: actions/cache@v3
        id: cache-system
        with:
          path: |
            /var/cache/apt/archives
            /usr/bin/chromium-browser
            /usr/bin/chromedriver
            /usr/bin/ffmpeg
            /usr/bin/xvfb
          key: ${{ runner.os }}-system-v2-${{ hashFiles('.github/workflows/system-deps.txt') }}
          restore-keys: |
            ${{ runner.os }}-system-v2-

      - name: Create system dependencies list
        run: |
          # إنشاء ملف بصمة للحزم (مرة واحدة)
          mkdir -p .github/workflows
          echo "ffmpeg chromium-browser chromium-chromedriver xvfb x11-utils" > .github/workflows/system-deps.txt
          echo "libgl1-mesa-glx libglib2.0-0 libnss3 libgconf-2-4 libfontconfig1" >> .github/workflows/system-deps.txt

      - name: Install system dependencies (if not cached)
        run: |
          # التحقق من وجود الحزم
          if ! command -v chromium-browser &> /dev/null; then
            echo "📦 تثبيت system dependencies..."
            sudo apt-get update
            sudo apt-get install -y \
              ffmpeg \
              chromium-browser \
              chromium-chromedriver \
              xvfb \
              x11-utils \
              libgl1-mesa-glx \
              libglib2.0-0 \
              libnss3 \
              libgconf-2-4 \
              libfontconfig1
          else
            echo "✅ system dependencies موجودة مسبقاً (من الكاش)"
          fi

      - name: Verify system dependencies
        run: |
          echo "✅ التحقق من الحزم المثبتة:"
          which chromium-browser || echo "❌ chromium-browser غير موجود"
          which chromedriver || echo "❌ chromedriver غير موجود"
          which ffmpeg || echo "❌ ffmpeg غير موجود"
          which Xvfb || echo "❌ xvfb غير موجود"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          # تحقق من المكتبات المثبتة أولاً
          if [ -f "requirements.txt" ]; then
            pip install --no-cache-dir -r requirements.txt
          else
            echo "⚠️ لا يوجد requirements.txt"
          fi

      - name: Run Bot
        env:
          CHROME_BIN: /usr/bin/chromium-browser
          CHROME_DRIVER: /usr/bin/chromedriver
          DISPLAY: :99
        run: |
          # تشغيل Xvfb في الخلفية
          Xvfb :99 -screen 0 1024x768x24 &
          # تشغيل البوت
          python3 main.py || echo "Bot session ended"

      - name: Save session changes
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          # تحقق من وجود الملفات قبل إضافتها
          if [ -f database/anime_bot.db ] || [ -f db.sqlite3 ]; then
            git add database/anime_bot.db db.sqlite3 2>/dev/null || true
            git commit -m "Update session data [skip ci]" || echo "No changes to commit"
            git push origin main || echo "Failed to push session updates"
          else
            echo "⚠️ لا توجد ملفات جلسة للحفظ"
          fi
