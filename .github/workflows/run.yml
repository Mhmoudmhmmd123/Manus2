name: CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'
    
    - name: Cache pip packages
      uses: actions/cache@v2
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run bot
      run: |
        xvfb-run -a python run.pyname: Anime WhatsApp Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser chromium-chromedriver
          pip install -r requirements.txt

      - name: Run Bot
        env:
          CHROME_BIN: /usr/bin/chromium-browser
          CHROME_DRIVER: /usr/bin/chromedriver
        run: |
          # تشغيل البوت في الخلفية لمدة ساعة (كمثال) أو حتى ينتهي
          timeout 1h python3 main.py || echo "Bot session ended or timed out"

      - name: Save session changes
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add database/anime_bot.db db.sqlite3
          git commit -m "Update session data [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Failed to push session updates"
          
