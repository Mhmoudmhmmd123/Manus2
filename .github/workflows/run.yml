name: Anime WhatsApp Bot

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_duration:
        description: 'مدة تشغيل البوت (بالدقائق)'
        required: true
        default: '55'
        type: choice
        options:
          - '30'
          - '55'
          - '120'
          - '180'
          - '300'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Cache system packages
        uses: actions/cache@v3
        id: cache-system
        with:
          path: |
            /var/cache/apt/archives
            /usr/bin/chromium-browser
            /usr/bin/chromedriver
            /usr/bin/ffmpeg
            /usr/bin/Xvfb
          key: ${{ runner.os }}-system-${{ hashFiles('.github/workflows/system-deps.txt') }}
          restore-keys: |
            ${{ runner.os }}-system-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            chromium-browser \
            chromium-chromedriver \
            xvfb \
            x11-utils

      - name: Install WhatsApp Python libraries
        run: |
          pip install --upgrade pip
          pip install pywa selenium webdriver-manager

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pywa selenium webdriver-manager pillow requests beautifulsoup4 lxml python-dotenv

      - name: Run Bot
        env:
          CHROME_BIN: /usr/bin/chromium-browser
          CHROME_DRIVER: /usr/bin/chromedriver
          DISPLAY: :99
        run: |
          # تشغيل Xvfb
          Xvfb :99 -screen 0 1024x768x24 -ac &
          sleep 3
          
          # تحديد مدة التشغيل
          DURATION=${{ github.event.inputs.run_duration || '55' }}
          echo "🚀 تشغيل البوت لمدة $DURATION دقيقة..."
          echo "⏳ سيتم إيقاف البوت تلقائياً بعد $DURATION دقيقة"
          
          # تشغيل البوت
          timeout ${DURATION}m python3 main.py || echo "✅ انتهت مدة التشغيل"
          
          echo "✅ تم إنهاء البوت"

      - name: Save session changes
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # حفظ الجلسة
          for file in database/*.db *.sqlite3 session/*.pkl auth_info.json; do
            if [ -f "$file" ]; then
              git add "$file" 2>/dev/null || true
            fi
          done
          
          git commit -m "🤖 تحديث الجلسة [skip ci]" || echo "لا تغييرات"
          git push origin main || echo "فشل الرفع"

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bot-logs-${{ github.run_id }}
          path: |
            *.log
            logs/
            screenshots/
          if-no-files-found: ignore
          retention-days: 7
